name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (type-check + bundle)
        run: npm run build

      - name: Run tests
        run: npm run test:ci